site_name: NS2dLab Python
site_description: Python port of DNSLab NS2dLab with CPU, GPU, validation, and flame/HIT workflow utilities
site_url: https://xiao312.github.io/NS2dLab_Python/
repo_url: https://github.com/xiao312/NS2dLab_Python
repo_name: xiao312/NS2dLab_Python
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xiao312/NS2dLab_Python
    - icon: fontawesome/solid/book
      link: https://doi.org/10.1016/j.cpc.2016.02.023

nav:
  - Home: index.md
  - Start here:
      - Overview: start-here/overview.md
      - Installation: start-here/installation.md
  - Tutorials:
      - Run your first simulation: tutorials/run-your-first-simulation.md
      - Compare CPU and GPU on the same case: tutorials/compare-cpu-and-gpu.md
      - Generate a flame/HIT workflow example: tutorials/flame-hit-workflow.md
  - How-to guides:
      - Install GPU support: how-to/install-gpu-support.md
      - Benchmark performance: how-to/benchmark-performance.md
      - Use the flame/HIT workflow: how-to/use-the-flame-hit-workflow.md
      - Regenerate documentation artifacts: how-to/regenerate-docs-artifacts.md
  - Reference:
      - CLI reference: reference/cli-reference.md
      - Output formats: reference/output-formats.md
      - API reference: reference/api-reference.md
      - Backend specification: reference/backend-specification.md
      - Project layout: reference/project-layout.md
  - Explanation:
      - Solver algorithms: explanation/solver-algorithms.md
      - Validation philosophy: explanation/validation-philosophy.md
      - GPU backend: explanation/gpu-backend.md
      - Flame/HIT methodology: explanation/flame-hit-methodology.md
  - Results:
      - Validation results: results/validation-results.md
      - Backend results: results/backend-results.md
      - Flame/HIT results: results/flame-hit-results.md
      - Figure style: results/figure-style.md
  - Contributing: contributing.md
